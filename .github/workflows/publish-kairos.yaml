---
name: Publish Kairos images

on:
  release:
    types:
      - prereleased
      - released

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      max-parallel: 1
      matrix:
        distro:
          - almalinux9
          - almalinux10
          - hadron0
        k3s_version:
          # renovate: datasource=custom.k3s depName=k3s_build
          - v1.30.2+k3s1
          # renovate: datasource=custom.k3s depName=k3s_build
          - v1.33.8+k3s1
          # renovate: datasource=custom.k3s depName=k3s_build
          - v1.34.4+k3s1
          # renovate: datasource=custom.k3s depName=k3s_build
          - v1.35.4+k3s1

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and versions
        id: versions
        run: |-
          # strip numbers and letters from distro to get the name and major version
          distro=$(echo ${{matrix.distro}} | grep -oE '[a-zA-Z]+')
          distro_major_version=$(echo ${{matrix.distro}} | grep -oE '[0-9]+')
          echo "distro=${distro}" >> "$GITHUB_OUTPUT"
          echo "distro_major_version=${distro_major_version}" >> "$GITHUB_OUTPUT"

          # derive the image name from the distro
          image_name="${{ env.REGISTRY }}/ucl-arc-environments/kairos-${distro}"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"

          # compute an image tag based on the release tag
          version_tag="${{ github.event.release.tag_name }}"
          echo "kairos_version=${version_tag}-${{matrix.distro}}" >> "$GITHUB_OUTPUT"

      - name: Compute tag and kairos version
        id: prerelease-tag
        if: ${{ github.event.release.prerelease }}
        run: |-
          # shellcheck disable=SC2129
          image_name="${{ steps.versions.outputs.image_name }}"
          version_tag="${{ github.event.release.tag_name }}"
          echo "image_tags=${image_name}:${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Compute tag and kairos version
        id: release-tag
        if: ${{ !github.event.release.prerelease }}
        run: |-
          # get the kairos-init version from the Dockerfile
          kairos_init_version="$(grep "^FROM quay.io/kairos/kairos-init:" "images/${distro}/Dockerfile.${distro_major_version}" | cut -d':' -f2 | awk -F '[@]' '{print $1}')"

          # compute the image tag based on the distro version, kairos-init and k3s versions
          kairos_tag="${distro_major_version}-standard-amd64-generic-${kairos_init_version}-k3s${{ matrix.k3s_version }}"

          image_name="${{ steps.versions.outputs.image_name }}"
          version_tag="${{ github.event.release.tag_name }}"

          # shellcheck disable=SC2129
          echo "image_tags=${image_name}:${kairos_tag//+/-},${image_name}:${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Extract tags and labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images:
            ${{ env.REGISTRY }}/ucl-arc-environments/kairos-${{
            steps.release-tag.outputs.distro }}

      - name: Build and push prerelease image
        if: ${{ github.event.release.prerelease }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: images/${{ steps.versions.outputs.distro }}
          file:
            images/${{ steps.versions.outputs.distro }}/Dockerfile.${{
            steps.versions.outputs.distro_major_version }}
          push: true
          tags: ${{ steps.prerelease-tag.outputs.image_tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            "VERSION=${{ steps.versions.outputs.kairos_version }}"
            "KUBERNETES_VERSION=${{ matrix.k3s_version }}"

      - name: Build and push release image
        if: ${{ !github.event.release.prerelease }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: images/${{ steps.versions.outputs.distro }}
          file:
            images/${{ steps.versions.outputs.distro }}/Dockerfile.${{
            steps.versions.outputs.distro_major_version }}
          push: true
          tags: ${{ steps.release-tag.outputs.image_tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            "VERSION=${{ steps.versions.outputs.kairos_version }}"
            "KUBERNETES_VERSION=${{ matrix.k3s_version }}"
